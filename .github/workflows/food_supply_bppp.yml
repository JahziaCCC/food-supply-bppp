name: Food Supply B+++ Weekly

on:
  schedule:
    - cron: "20 23 * * 0"   # Sun 23:20 UTC ~ Mon 02:20 KSA
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # AIS_SUMMARY_JSON: ${{ secrets.AIS_SUMMARY_JSON }}
        run: |
          python food_supply_monitor.py

      - name: Commit state (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add food_supply_state.json || true
          git commit -m "Update state" || true
          git push || true
